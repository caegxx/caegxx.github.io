<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0d2342">Five Ways a Promised Route Dies</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#4a6b8c">Failure patterns from board approval to silent shelving</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#1e3a5f"/>
    </marker>
  </defs>

  <!-- Central node: Proposed Route -->
  <rect x="350" y="80" width="200" height="50" rx="6" fill="#1e3a5f"/>
  <text x="450" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Proposed Route</text>
  <text x="450" y="121" text-anchor="middle" font-size="10" fill="#c5d6e8">Approved on paper</text>

  <!-- 5 failure paths radiating below -->

  <!-- Connecting lines from central to 5 boxes -->
  <g stroke="#dc2626" stroke-width="1.6" stroke-dasharray="4,3" fill="none">
    <path d="M 410 130 Q 200 170 110 180" marker-end="url(#arr)"/>
    <path d="M 430 130 Q 290 180 270 200" marker-end="url(#arr)"/>
    <path d="M 450 130 L 450 200" marker-end="url(#arr)"/>
    <path d="M 470 130 Q 610 180 630 200" marker-end="url(#arr)"/>
    <path d="M 490 130 Q 700 170 790 180" marker-end="url(#arr)"/>
  </g>

  <!-- Box 1: Regulatory Death -->
  <g>
    <rect x="20" y="190" width="170" height="180" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
    <circle cx="50" cy="218" r="14" fill="#dc2626"/>
    <text x="50" y="223" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">1</text>
    <text x="105" y="218" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Regulatory</text>
    <text x="105" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Death</text>
    <line x1="35" y1="248" x2="175" y2="248" stroke="#dc2626" stroke-width="0.5" opacity="0.4"/>
    <text x="105" y="266" text-anchor="middle" font-size="9.5" fill="#7f1d1d">FAOC denied,</text>
    <text x="105" y="280" text-anchor="middle" font-size="9.5" fill="#7f1d1d">designation rejected,</text>
    <text x="105" y="294" text-anchor="middle" font-size="9.5" fill="#7f1d1d">permit stalled</text>
    <text x="105" y="320" text-anchor="middle" font-size="9" fill="#991b1b" font-weight="600">Early signal:</text>
    <text x="105" y="334" text-anchor="middle" font-size="9" fill="#7f1d1d">CAA stops replying</text>
    <text x="105" y="348" text-anchor="middle" font-size="9" fill="#7f1d1d">to follow-up emails</text>
  </g>

  <!-- Box 2: Commercial Cold Feet -->
  <g>
    <rect x="200" y="210" width="170" height="180" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
    <circle cx="230" cy="238" r="14" fill="#dc2626"/>
    <text x="230" y="243" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2</text>
    <text x="285" y="238" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Commercial</text>
    <text x="285" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Cold Feet</text>
    <line x1="215" y1="268" x2="355" y2="268" stroke="#dc2626" stroke-width="0.5" opacity="0.4"/>
    <text x="285" y="286" text-anchor="middle" font-size="9.5" fill="#7f1d1d">Demand forecast</text>
    <text x="285" y="300" text-anchor="middle" font-size="9.5" fill="#7f1d1d">downgraded,</text>
    <text x="285" y="314" text-anchor="middle" font-size="9.5" fill="#7f1d1d">competitor moves first</text>
    <text x="285" y="340" text-anchor="middle" font-size="9" fill="#991b1b" font-weight="600">Early signal:</text>
    <text x="285" y="354" text-anchor="middle" font-size="9" fill="#7f1d1d">"one more market</text>
    <text x="285" y="368" text-anchor="middle" font-size="9" fill="#7f1d1d">study" requested</text>
  </g>

  <!-- Box 3: Partner Collapse -->
  <g>
    <rect x="380" y="210" width="170" height="180" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
    <circle cx="410" cy="238" r="14" fill="#dc2626"/>
    <text x="410" y="243" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">3</text>
    <text x="465" y="238" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Partner</text>
    <text x="465" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Collapse</text>
    <line x1="395" y1="268" x2="535" y2="268" stroke="#dc2626" stroke-width="0.5" opacity="0.4"/>
    <text x="465" y="286" text-anchor="middle" font-size="9.5" fill="#7f1d1d">Ground handling fails,</text>
    <text x="465" y="300" text-anchor="middle" font-size="9.5" fill="#7f1d1d">codeshare partner</text>
    <text x="465" y="314" text-anchor="middle" font-size="9.5" fill="#7f1d1d">withdraws</text>
    <text x="465" y="340" text-anchor="middle" font-size="9" fill="#991b1b" font-weight="600">Early signal:</text>
    <text x="465" y="354" text-anchor="middle" font-size="9" fill="#7f1d1d">SGHA negotiations</text>
    <text x="465" y="368" text-anchor="middle" font-size="9" fill="#7f1d1d">drag past Day 60</text>
  </g>

  <!-- Box 4: Internal Politics -->
  <g>
    <rect x="560" y="210" width="170" height="180" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
    <circle cx="590" cy="238" r="14" fill="#dc2626"/>
    <text x="590" y="243" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">4</text>
    <text x="645" y="238" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Internal</text>
    <text x="645" y="252" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Politics</text>
    <line x1="575" y1="268" x2="715" y2="268" stroke="#dc2626" stroke-width="0.5" opacity="0.4"/>
    <text x="645" y="286" text-anchor="middle" font-size="9.5" fill="#7f1d1d">Management change,</text>
    <text x="645" y="300" text-anchor="middle" font-size="9.5" fill="#7f1d1d">strategy reshuffle,</text>
    <text x="645" y="314" text-anchor="middle" font-size="9.5" fill="#7f1d1d">project sponsor exit</text>
    <text x="645" y="340" text-anchor="middle" font-size="9" fill="#991b1b" font-weight="600">Early signal:</text>
    <text x="645" y="354" text-anchor="middle" font-size="9" fill="#7f1d1d">Original champion</text>
    <text x="645" y="368" text-anchor="middle" font-size="9" fill="#7f1d1d">leaves or is sidelined</text>
  </g>

  <!-- Box 5: External Shock -->
  <g>
    <rect x="740" y="190" width="150" height="180" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
    <circle cx="770" cy="218" r="14" fill="#dc2626"/>
    <text x="770" y="223" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">5</text>
    <text x="822" y="218" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">External</text>
    <text x="822" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">Shock</text>
    <line x1="755" y1="248" x2="877" y2="248" stroke="#dc2626" stroke-width="0.5" opacity="0.4"/>
    <text x="815" y="266" text-anchor="middle" font-size="9.5" fill="#7f1d1d">Geopolitics,</text>
    <text x="815" y="280" text-anchor="middle" font-size="9.5" fill="#7f1d1d">currency crisis,</text>
    <text x="815" y="294" text-anchor="middle" font-size="9.5" fill="#7f1d1d">epidemic, conflict</text>
    <text x="815" y="320" text-anchor="middle" font-size="9" fill="#991b1b" font-weight="600">Early signal:</text>
    <text x="815" y="334" text-anchor="middle" font-size="9" fill="#7f1d1d">Travel advisories</text>
    <text x="815" y="348" text-anchor="middle" font-size="9" fill="#7f1d1d">or capital controls</text>
  </g>

  <!-- Bottom: Common Outcome -->
  <rect x="200" y="430" width="500" height="60" rx="6" fill="#1e3a5f"/>
  <text x="450" y="455" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Common outcome: Silent Shelving</text>
  <text x="450" y="475" text-anchor="middle" font-size="10" fill="#c5d6e8">No formal cancellation. The route simply stops being mentioned in meetings.</text>

  <!-- Bottom note -->
  <g>
    <rect x="100" y="520" width="700" height="80" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
    <text x="450" y="544" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">The hardest part of network planning is not designing routes that succeed.</text>
    <text x="450" y="561" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">It is recognising the routes that are already dying, before more resources are committed.</text>
    <text x="450" y="585" text-anchor="middle" font-size="10" fill="#92400e">Failure rates in route launches are higher than the press releases suggest. Most teams have lived all five patterns.</text>
  </g>
</svg>
