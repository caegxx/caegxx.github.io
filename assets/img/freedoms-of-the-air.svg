<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0d2342">The Nine Freedoms of the Air</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#4a6b8c">What each traffic right actually permits in commercial air services</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#1e3a5f"/>
    </marker>
  </defs>

  <!-- 9 panels in 3 rows of 3 -->
  <!-- Common styling helpers via inline -->

  <!-- =================== Row 1 =================== -->

  <!-- Panel 1: First Freedom -->
  <g transform="translate(40,80)">
    <rect width="260" height="155" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
    <text x="130" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#0d2342">1st Freedom — Overflight</text>
    <text x="130" y="38" text-anchor="middle" font-size="9.5" fill="#4a6b8c">Fly across foreign state without landing</text>
    <!-- diagram: A → over B → land elsewhere; here we show A→B (just overfly arrow above) -->
    <circle cx="40" cy="100" r="14" fill="#1e3a5f"/>
    <text x="40" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">A</text>
    <rect x="100" y="86" width="60" height="28" rx="2" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <text x="130" y="103" text-anchor="middle" font-size="10" fill="#475569">State B</text>
    <circle cx="220" cy="100" r="14" fill="#94a3b8"/>
    <text x="220" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">C</text>
    <path d="M 56 80 Q 130 50 204 80" stroke="#1e3a5f" stroke-width="1.8" fill="none" marker-end="url(#ar)"/>
    <text x="130" y="140" text-anchor="middle" font-size="9" fill="#64748b">No commercial activity in B</text>
  </g>

  <!-- Panel 2: Second Freedom -->
  <g transform="translate(320,80)">
    <rect width="260" height="155" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
    <text x="130" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#0d2342">2nd Freedom — Technical Stop</text>
    <text x="130" y="38" text-anchor="middle" font-size="9.5" fill="#4a6b8c">Land in foreign state for non-traffic purposes</text>
    <circle cx="40" cy="100" r="14" fill="#1e3a5f"/>
    <text x="40" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">A</text>
    <rect x="100" y="86" width="60" height="28" rx="2" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
    <text x="130" y="103" text-anchor="middle" font-size="10" fill="#475569">State B</text>
    <circle cx="220" cy="100" r="14" fill="#94a3b8"/>
    <text x="220" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">C</text>
    <path d="M 56 100 L 95 100" stroke="#1e3a5f" stroke-width="1.8" fill="none" marker-end="url(#ar)"/>
    <path d="M 165 100 L 204 100" stroke="#1e3a5f" stroke-width="1.8" fill="none" marker-end="url(#ar)"/>
    <text x="130" y="140" text-anchor="middle" font-size="9" fill="#64748b">Refuel only, no pax embark/disembark</text>
  </g>

  <!-- Panel 3: Third Freedom -->
  <g transform="translate(600,80)">
    <rect width="260" height="155" rx="6" fill="#dbeafe" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="130" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#0d2342">3rd Freedom — Outbound</text>
    <text x="130" y="38" text-anchor="middle" font-size="9.5" fill="#1e3a5f">Carry pax from home to foreign state</text>
    <circle cx="60" cy="100" r="16" fill="#1e3a5f"/>
    <text x="60" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">A</text>
    <circle cx="200" cy="100" r="16" fill="#1e3a5f"/>
    <text x="200" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">B</text>
    <path d="M 78 100 L 182 100" stroke="#1e3a5f" stroke-width="2.4" fill="none" marker-end="url(#ar)"/>
    <text x="130" y="86" text-anchor="middle" font-size="10" fill="#0d2342" font-weight="600">PAX A→B</text>
    <text x="130" y="140" text-anchor="middle" font-size="9" fill="#1e3a5f">Core right of every bilateral ASA</text>
  </g>

  <!-- =================== Row 2 =================== -->

  <!-- Panel 4: Fourth Freedom -->
  <g transform="translate(40,250)">
    <rect width="260" height="155" rx="6" fill="#dbeafe" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="130" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#0d2342">4th Freedom — Inbound</text>
    <text x="130" y="38" text-anchor="middle" font-size="9.5" fill="#1e3a5f">Carry pax from foreign state back home</text>
    <circle cx="60" cy="100" r="16" fill="#1e3a5f"/>
    <text x="60" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">A</text>
    <circle cx="200" cy="100" r="16" fill="#1e3a5f"/>
    <text x="200" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">B</text>
    <path d="M 182 100 L 78 100" stroke="#1e3a5f" stroke-width="2.4" fill="none" marker-end="url(#ar)"/>
    <text x="130" y="86" text-anchor="middle" font-size="10" fill="#0d2342" font-weight="600">PAX B→A</text>
    <text x="130" y="140" text-anchor="middle" font-size="9" fill="#1e3a5f">Paired with 3rd in nearly every ASA</text>
  </g>

  <!-- Panel 5: Fifth Freedom -->
  <g transform="translate(320,250)">
    <rect width="260" height="155" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="130" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#0d2342">5th Freedom — Beyond Point</text>
    <text x="130" y="38" text-anchor="middle" font-size="9.5" fill="#92400e">Carry pax between two foreign states</text>
    <circle cx="40" cy="100" r="14" fill="#1e3a5f"/>
    <text x="40" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">A</text>
    <circle cx="130" cy="100" r="14" fill="#d97706"/>
    <text x="130" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">B</text>
    <circle cx="220" cy="100" r="14" fill="#d97706"/>
    <text x="220" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">C</text>
    <path d="M 56 100 L 114 100" stroke="#1e3a5f" stroke-width="2" fill="none" marker-end="url(#ar)"/>
    <path d="M 146 100 L 204 100" stroke="#d97706" stroke-width="2" fill="none" marker-end="url(#ar)"/>
    <text x="130" y="140" text-anchor="middle" font-size="9" fill="#92400e">Scarce, separately negotiated</text>
  </g>

  <!-- Panel 6: Sixth Freedom -->
  <g transform="translate(600,250)">
    <rect width="260" height="155" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="130" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#0d2342">6th Freedom — Via Home</text>
    <text x="130" y="38" text-anchor="middle" font-size="9.5" fill="#92400e">Two foreign states via home state</text>
    <circle cx="40" cy="100" r="14" fill="#d97706"/>
    <text x="40" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">B</text>
    <circle cx="130" cy="100" r="14" fill="#1e3a5f"/>
    <text x="130" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">A</text>
    <circle cx="220" cy="100" r="14" fill="#d97706"/>
    <text x="220" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">C</text>
    <path d="M 56 100 L 114 100" stroke="#d97706" stroke-width="2" fill="none" marker-end="url(#ar)"/>
    <path d="M 146 100 L 204 100" stroke="#1e3a5f" stroke-width="2" fill="none" marker-end="url(#ar)"/>
    <text x="130" y="140" text-anchor="middle" font-size="9" fill="#92400e">Hub-and-spoke business model basis</text>
  </g>

  <!-- =================== Row 3 =================== -->

  <!-- Panel 7: Seventh Freedom -->
  <g transform="translate(40,420)">
    <rect width="260" height="155" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="130" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#0d2342">7th Freedom — Standalone</text>
    <text x="130" y="38" text-anchor="middle" font-size="9.5" fill="#7f1d1d">B↔C without touching home A</text>
    <circle cx="40" cy="100" r="14" fill="#94a3b8"/>
    <text x="40" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">A</text>
    <circle cx="130" cy="100" r="14" fill="#dc2626"/>
    <text x="130" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">B</text>
    <circle cx="220" cy="100" r="14" fill="#dc2626"/>
    <text x="220" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">C</text>
    <path d="M 146 100 L 204 100" stroke="#dc2626" stroke-width="2.4" fill="none" marker-end="url(#ar)"/>
    <text x="40" y="125" text-anchor="middle" font-size="9" fill="#94a3b8">(not used)</text>
    <text x="130" y="140" text-anchor="middle" font-size="9" fill="#7f1d1d">Very rare; freight focus</text>
  </g>

  <!-- Panel 8: Eighth Freedom -->
  <g transform="translate(320,420)">
    <rect width="260" height="155" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="130" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#0d2342">8th Freedom — Consecutive Cabotage</text>
    <text x="130" y="38" text-anchor="middle" font-size="9.5" fill="#7f1d1d">Two points within B, as continuation of A→B</text>
    <circle cx="40" cy="100" r="14" fill="#1e3a5f"/>
    <text x="40" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">A</text>
    <rect x="100" y="80" width="120" height="40" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="130" cy="100" r="10" fill="#dc2626"/>
    <text x="130" y="104" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">B1</text>
    <circle cx="190" cy="100" r="10" fill="#dc2626"/>
    <text x="190" y="104" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">B2</text>
    <text x="160" y="74" text-anchor="middle" font-size="8" fill="#7f1d1d">within State B</text>
    <path d="M 56 100 L 116 100" stroke="#1e3a5f" stroke-width="2" fill="none" marker-end="url(#ar)"/>
    <path d="M 142 100 L 178 100" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#ar)"/>
    <text x="130" y="140" text-anchor="middle" font-size="9" fill="#7f1d1d">Almost never granted</text>
  </g>

  <!-- Panel 9: Ninth Freedom -->
  <g transform="translate(600,420)">
    <rect width="260" height="155" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="130" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#0d2342">9th Freedom — Stand-alone Cabotage</text>
    <text x="130" y="38" text-anchor="middle" font-size="9.5" fill="#7f1d1d">Two points within B, no link to home</text>
    <circle cx="40" cy="100" r="14" fill="#94a3b8"/>
    <text x="40" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">A</text>
    <rect x="100" y="80" width="120" height="40" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="130" cy="100" r="10" fill="#dc2626"/>
    <text x="130" y="104" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">B1</text>
    <circle cx="190" cy="100" r="10" fill="#dc2626"/>
    <text x="190" y="104" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">B2</text>
    <text x="160" y="74" text-anchor="middle" font-size="8" fill="#7f1d1d">within State B</text>
    <path d="M 142 100 L 178 100" stroke="#dc2626" stroke-width="2" fill="none" marker-end="url(#ar)"/>
    <text x="40" y="125" text-anchor="middle" font-size="9" fill="#94a3b8">(not used)</text>
    <text x="130" y="140" text-anchor="middle" font-size="9" fill="#7f1d1d">EU internal market only</text>
  </g>

  <!-- Legend -->
  <g font-size="10" fill="#4a6b8c">
    <rect x="100" y="595" width="14" height="10" fill="#dbeafe" stroke="#1e3a5f" stroke-width="1"/>
    <text x="120" y="604">Core rights (almost universal)</text>
    <rect x="320" y="595" width="14" height="10" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
    <text x="340" y="604">Negotiated separately</text>
    <rect x="520" y="595" width="14" height="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
    <text x="540" y="604">Rarely granted / restricted</text>
  </g>
</svg>
