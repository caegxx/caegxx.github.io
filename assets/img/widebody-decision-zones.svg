<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="Helvetica, Arial, sans-serif">
  <rect width="900" height="600" fill="#ffffff"/>

  <!--
    Coordinate system (linear, uniform):
      X axis (Daily one-way demand):
        100 pax → x=140
        700 pax → x=820
        scale: 1 pax = 1.133 px,  offset 140 - 100*1.133 = 26.67
        formula:  x = 26.67 + pax * 1.133

      Y axis (Route distance in nm), inverted (more distance = higher up = smaller y):
        3000 nm → y=500
        9000 nm → y=100
        scale: 1 nm = -0.0667 px per nm (going up),
        formula: y = 500 - (nm - 3000) * 0.0667

      Quick check formulas (verified):
        nm=3000 → y=500 ✓
        nm=4000 → y=433
        nm=5000 → y=367
        nm=6000 → y=300
        nm=7000 → y=233
        nm=8000 → y=167
        nm=9000 → y=100 ✓
        pax=100 → x=140 ✓
        pax=200 → x=253
        pax=300 → x=367
        pax=400 → x=480
        pax=500 → x=593
        pax=600 → x=706
        pax=700 → x=820 ✓
  -->

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0d2342">Where Each Wide-body Wins</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#4a6b8c">Aircraft selection by route distance and daily demand from Asian hubs</text>

  <!-- Chart frame -->
  <line x1="140" y1="100" x2="140" y2="500" stroke="#0d2342" stroke-width="1.5"/>
  <line x1="140" y1="500" x2="820" y2="500" stroke="#0d2342" stroke-width="1.5"/>

  <!-- Y axis label -->
  <text x="50" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#0d2342" transform="rotate(-90 50 300)">Route Distance (nm)</text>

  <!-- X axis label -->
  <text x="480" y="555" text-anchor="middle" font-size="12" font-weight="700" fill="#0d2342">Daily One-way Demand (pax)</text>

  <!-- Y axis ticks (uniform, every 1000 nm) -->
  <g font-size="10" fill="#0d2342" text-anchor="end">
    <text x="132" y="504">3,000</text>
    <line x1="135" y1="500" x2="140" y2="500" stroke="#0d2342"/>

    <text x="132" y="437">4,000</text>
    <line x1="135" y1="433" x2="140" y2="433" stroke="#0d2342"/>

    <text x="132" y="371">5,000</text>
    <line x1="135" y1="367" x2="140" y2="367" stroke="#0d2342"/>

    <text x="132" y="304">6,000</text>
    <line x1="135" y1="300" x2="140" y2="300" stroke="#0d2342"/>

    <text x="132" y="237">7,000</text>
    <line x1="135" y1="233" x2="140" y2="233" stroke="#0d2342"/>

    <text x="132" y="171">8,000</text>
    <line x1="135" y1="167" x2="140" y2="167" stroke="#0d2342"/>

    <text x="132" y="104">9,000</text>
    <line x1="135" y1="100" x2="140" y2="100" stroke="#0d2342"/>
  </g>

  <!-- Y axis grid lines (subtle) -->
  <g stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="2,3">
    <line x1="140" y1="433" x2="820" y2="433"/>
    <line x1="140" y1="367" x2="820" y2="367"/>
    <line x1="140" y1="300" x2="820" y2="300"/>
    <line x1="140" y1="233" x2="820" y2="233"/>
    <line x1="140" y1="167" x2="820" y2="167"/>
  </g>

  <!-- X axis ticks (uniform, every 100 pax) -->
  <g font-size="10" fill="#0d2342" text-anchor="middle">
    <line x1="140" y1="500" x2="140" y2="505" stroke="#0d2342"/>
    <text x="140" y="520">100</text>

    <line x1="253" y1="500" x2="253" y2="505" stroke="#0d2342"/>
    <text x="253" y="520">200</text>

    <line x1="367" y1="500" x2="367" y2="505" stroke="#0d2342"/>
    <text x="367" y="520">300</text>

    <line x1="480" y1="500" x2="480" y2="505" stroke="#0d2342"/>
    <text x="480" y="520">400</text>

    <line x1="593" y1="500" x2="593" y2="505" stroke="#0d2342"/>
    <text x="593" y="520">500</text>

    <line x1="706" y1="500" x2="706" y2="505" stroke="#0d2342"/>
    <text x="706" y="520">600</text>

    <line x1="820" y1="500" x2="820" y2="505" stroke="#0d2342"/>
    <text x="820" y="520">700</text>
  </g>

  <!-- X axis grid lines (subtle) -->
  <g stroke="#e2e8f0" stroke-width="0.5" stroke-dasharray="2,3">
    <line x1="253" y1="100" x2="253" y2="500"/>
    <line x1="367" y1="100" x2="367" y2="500"/>
    <line x1="480" y1="100" x2="480" y2="500"/>
    <line x1="593" y1="100" x2="593" y2="500"/>
    <line x1="706" y1="100" x2="706" y2="500"/>
  </g>

  <!--
    ZONES - based on demand thresholds from article text:
      A330-900neo:  demand < ~280 pax,  distance < ~6500 nm  → lower-left
      787-9:        demand 280-320,    distance any         → middle column
      A350-900:     demand 320-380 OR distance > 7500 nm    → upper-right + top
      Larger variants: demand > 380 pax

    Coordinate boundaries (using x = 26.67 + pax * 1.133):
      280 pax → x=344
      320 pax → x=389
      380 pax → x=457
      6500 nm → y=267
      7500 nm → y=200
  -->

  <!-- A330-900neo zone: lower-left (280 pax, 6500 nm boundary) -->
  <path d="M 140 267 L 344 267 L 344 500 L 140 500 Z" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" opacity="0.55"/>
  <text x="242" y="385" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">A330-900neo zone</text>
  <text x="242" y="402" text-anchor="middle" font-size="10" fill="#92400e">Lower demand,</text>
  <text x="242" y="416" text-anchor="middle" font-size="10" fill="#92400e">medium distance</text>
  <text x="242" y="432" text-anchor="middle" font-size="9" fill="#92400e">Lowest trip cost wins</text>

  <!-- 787-9 zone: middle column 280-320 pax, up to ~7500 nm -->
  <path d="M 344 200 L 389 200 L 389 500 L 344 500 Z" fill="#dbeafe" stroke="#1e3a5f" stroke-width="1.5" opacity="0.7"/>
  <text x="366" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#0d2342">787-9</text>
  <text x="366" y="335" text-anchor="middle" font-size="9" fill="#0d2342">Mid demand,</text>
  <text x="366" y="349" text-anchor="middle" font-size="9" fill="#0d2342">cabin product</text>

  <!-- A350-900 zone: high demand (320-380) OR ultra long-haul (>7500 nm) -->
  <!-- Upper band: any demand above 7500 nm goes to A350 -->
  <path d="M 140 100 L 820 100 L 820 200 L 140 200 Z" fill="#dcfce7" stroke="#15803d" stroke-width="1.5" opacity="0.65"/>
  <text x="480" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">A350-900 zone (ultra long-haul)</text>
  <text x="480" y="157" text-anchor="middle" font-size="10" fill="#14532d">Above ~7,500 nm — all demand levels</text>

  <!-- Right band: high demand 320-380 pax at medium-long distance -->
  <path d="M 389 200 L 457 200 L 457 500 L 389 500 Z" fill="#dcfce7" stroke="#15803d" stroke-width="1.5" opacity="0.65"/>
  <text x="423" y="345" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">A350-900</text>
  <text x="423" y="360" text-anchor="middle" font-size="9" fill="#14532d">Higher demand,</text>
  <text x="423" y="374" text-anchor="middle" font-size="9" fill="#14532d">long-haul</text>

  <!-- Top-right: very high demand at long-haul → larger variants -->
  <path d="M 457 200 L 820 200 L 820 500 L 457 500 Z" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" opacity="0.5"/>
  <text x="640" y="335" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">A350-1000 / 787-10</text>
  <text x="640" y="352" text-anchor="middle" font-size="9" fill="#7f1d1d">territory</text>
  <text x="640" y="370" text-anchor="middle" font-size="9" fill="#7f1d1d">(larger variants,</text>
  <text x="640" y="383" text-anchor="middle" font-size="9" fill="#7f1d1d">out of scope here)</text>

  <!--
    EXAMPLE ROUTES with verified coordinates (revised pax estimates):
      x = 26.67 + pax * 1.133
      y = 500 - (nm - 3000) * 0.0667

    SIN-SYD: 3,400 nm, 270 pax → x=333, y=473
    HKG-LHR: 5,200 nm, 340 pax → x=412, y=353
    SIN-JFK: 8,300 nm, 161 pax → x=209, y=147  (SIA ULR config)
    BKK-DOH: 3,300 nm, 260 pax → x=321, y=480
    NRT-CDG: 5,200 nm, 295 pax → x=361, y=353
  -->

  <g>
    <!-- SIN-SYD: 3,400 nm, 270 pax → A330neo edge / 787-9 boundary -->
    <circle cx="333" cy="473" r="6" fill="#92400e" stroke="#ffffff" stroke-width="1.5"/>
    <text x="160" y="471" font-size="9" fill="#92400e" font-weight="600">SIN-SYD</text>
    <text x="160" y="483" font-size="8" fill="#64748b">3,400 nm · 270 pax</text>

    <!-- HKG-LHR: 5,200 nm, 340 pax → A350-900 zone -->
    <circle cx="412" cy="353" r="6" fill="#14532d" stroke="#ffffff" stroke-width="1.5"/>
    <text x="450" y="348" font-size="9" fill="#14532d" font-weight="600">HKG-LHR</text>
    <text x="450" y="360" font-size="8" fill="#64748b">5,200 nm · 340 pax</text>

    <!-- SIN-JFK: 8,300 nm, ~161 pax (SIA ULR config) → A350 ultra long-haul -->
    <circle cx="209" cy="147" r="6" fill="#14532d" stroke="#ffffff" stroke-width="1.5"/>
    <text x="224" y="142" font-size="9" fill="#14532d" font-weight="600">SIN-JFK</text>
    <text x="224" y="154" font-size="8" fill="#64748b">8,300 nm · 161 pax (A350ULR)</text>

    <!-- BKK-DOH: 3,300 nm, 260 pax → A330neo zone -->
    <circle cx="321" cy="480" r="6" fill="#92400e" stroke="#ffffff" stroke-width="1.5"/>
    <text x="335" y="475" font-size="9" fill="#92400e" font-weight="600">BKK-DOH</text>
    <text x="335" y="487" font-size="8" fill="#64748b">3,300 nm · 260 pax</text>

    <!-- NRT-CDG: 5,200 nm, 295 pax → 787-9 zone -->
    <circle cx="361" cy="353" r="6" fill="#0d2342" stroke="#ffffff" stroke-width="1.5"/>
    <text x="220" y="351" font-size="9" fill="#0d2342" font-weight="600">NRT-CDG</text>
    <text x="220" y="363" font-size="8" fill="#64748b">5,200 nm · 295 pax</text>
  </g>

  <!-- Legend -->
  <g font-size="10" fill="#4a6b8c">
    <rect x="140" y="572" width="14" height="10" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
    <text x="160" y="581">A330-900neo wins</text>

    <rect x="290" y="572" width="14" height="10" fill="#dbeafe" stroke="#1e3a5f" stroke-width="1"/>
    <text x="310" y="581">787-9 wins</text>

    <rect x="420" y="572" width="14" height="10" fill="#dcfce7" stroke="#15803d" stroke-width="1"/>
    <text x="440" y="581">A350-900 wins</text>

    <rect x="570" y="572" width="14" height="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
    <text x="590" y="581">Larger variants</text>
  </g>
</svg>
