<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Navy circle background -->
  <circle cx="100" cy="100" r="100" fill="#1e3a5f"/>

  <!-- Five dashed route lines radiating from hub -->
  <g stroke="#ffffff" stroke-width="1.4" stroke-dasharray="3,3" stroke-linecap="round" fill="none" opacity="0.55">
    <line x1="100" y1="100" x2="100" y2="38"/>
    <line x1="100" y1="100" x2="160" y2="70"/>
    <line x1="100" y1="100" x2="150" y2="158"/>
    <line x1="100" y1="100" x2="50" y2="158"/>
    <line x1="100" y1="100" x2="40" y2="70"/>
  </g>

  <!-- Outer destination nodes -->
  <g fill="#ffffff">
    <circle cx="100" cy="38" r="4.5"/>
    <circle cx="160" cy="70" r="4.5"/>
    <circle cx="150" cy="158" r="4.5"/>
    <circle cx="50" cy="158" r="4.5"/>
    <circle cx="40" cy="70" r="4.5"/>
  </g>

  <!-- Hub (concentric ring marks the base) -->
  <circle cx="100" cy="100" r="7" fill="#ffffff"/>
  <circle cx="100" cy="100" r="3.5" fill="#1e3a5f"/>

  <!-- Small aircraft flying along the upper-right route -->
  <g transform="translate(130 85) rotate(62)" fill="#ffffff">
    <rect x="-1.4" y="-9" width="2.8" height="16" rx="1.4"/>
    <path d="M 0 -10.5 L -2 -6.5 L 2 -6.5 Z"/>
    <path d="M -1.4 -1 L -10 4 L -10 6 L -1.4 3 Z"/>
    <path d="M 1.4 -1 L 10 4 L 10 6 L 1.4 3 Z"/>
    <path d="M -1.4 5.5 L -4 9 L -4 10 L -1.4 7.5 Z"/>
    <path d="M 1.4 5.5 L 4 9 L 4 10 L 1.4 7.5 Z"/>
  </g>
</svg>
